<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#6dd3ff" />
      <stop offset="1" stop-color="#7ee787" />
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#a18fff" />
      <stop offset="1" stop-color="#7ee787" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="none"/>

  <!-- faint grid background -->
  <g opacity="0.06">
    <rect x="0" y="0" width="800" height="450" fill="url(#g2)"/>
    <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
      <!-- vertical lines -->
      <g>
        <path d="M40 0 L40 450" />
        <path d="M80 0 L80 450" />
        <path d="M120 0 L120 450" />
        <path d="M160 0 L160 450" />
        <path d="M200 0 L200 450" />
      </g>
      <!-- horizontal lines -->
      <g>
        <path d="M0 40 L800 40" />
        <path d="M0 80 L800 80" />
        <path d="M0 120 L800 120" />
        <path d="M0 160 L800 160" />
        <path d="M0 200 L800 200" />
      </g>
    </g>
  </g>

  <!-- Gamepad silhouette -->
  <g id="gamepad" transform="translate(200,210) scale(1)">
    <path d="M-120 -40 Q -140 -80 -100 -110 L 100 -110 Q 140 -80 120 -40 L 100 40 Q 80 80 40 60 L -40 60 Q -80 80 -100 40 Z" fill="url(#g1)" filter="url(#glow)"/>
    <!-- Buttons -->
    <circle cx="30" cy="-20" r="10" fill="#fff" opacity="0.95"/>
    <circle cx="60" cy="10" r="8" fill="#ff6b6b"/>
    <circle cx="15" cy="10" r="8" fill="#ffd166"/>
    <circle cx="-10" cy="-10" r="8" fill="#4dffb9"/>
    <!-- D-pad -->
    <g transform="translate(-50,0)" fill="#ffffff">
      <rect x="-6" y="-22" width="12" height="14" rx="2"/>
      <rect x="-22" y="-6" width="14" height="12" rx="2"/>
      <rect x="-6" y="8" width="12" height="14" rx="2"/>
      <rect x="8" y="-6" width="14" height="12" rx="2"/>
    </g>
  </g>

  <!-- Gear element to suggest development/tools -->
  <g id="gear" transform="translate(540,120) scale(1)">
    <circle cx="0" cy="0" r="36" fill="none" stroke="url(#g2)" stroke-width="6"/>
    <g fill="url(#g2)">
      <path d="M46 0 L60 10 L66 30 L54 42 L40 32 L34 12 Z" transform="rotate(0) translate(-46,0)"/>
      <path d="M-46 0 L-60 -10 L-66 -30 L-54 -42 L-40 -32 L-34 -12 Z" transform="rotate(0) translate(46,0)"/>
    </g>
  </g>

  <!-- small floating particles -->
  <g id="particles">
    <circle cx="120" cy="60" r="2" fill="#ffffff" opacity="0.9"/>
    <circle cx="220" cy="30" r="1.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="600" cy="40" r="2" fill="#ffffff" opacity="0.8"/>
    <circle cx="680" cy="90" r="1.8" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- subtle animated text (game dev) -->
  <g id="label" transform="translate(320,350)" opacity="0.85">
    <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="22" fill="#e6eef8">Game Development • Gameplay • Systems</text>
  </g>

</svg>

